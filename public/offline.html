<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1E3A5F" />
    <title>Asset System Offline</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, Arial, sans-serif;
        background: #f8fafc;
        color: #0f172a;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(100%, 440px);
        border: 1px solid #dbe3ed;
        border-radius: 12px;
        background: #ffffff;
        box-shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
        padding: 24px;
      }

      img {
        width: 64px;
        height: 64px;
        border-radius: 16px;
      }

      h1 {
        margin: 18px 0 8px;
        font-size: 24px;
        line-height: 1.2;
      }

      p {
        margin: 0;
        color: #475569;
        line-height: 1.6;
      }

      .hint {
        margin-top: 16px;
        border-radius: 8px;
        background: #eef6ff;
        padding: 12px;
        color: #1e3a5f;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/icons/icon-192.png" alt="Asset System" />
      <h1>ยังเชื่อมต่อระบบไม่ได้</h1>
      <p>ตรวจสอบสัญญาณอินเทอร์เน็ตหรือ VPN แล้วลองเปิดหน้านี้อีกครั้ง</p>
      <p class="hint">หน้าตรวจนับทรัพย์สินจะเก็บคิวสแกนในเครื่องเมื่อส่งข้อมูลไม่สำเร็จ และสามารถกดส่งซ้ำเมื่อกลับมาออนไลน์ได้</p>
    </main>
  </body>
</html>
